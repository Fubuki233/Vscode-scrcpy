name: Check scrhub update

on:
  schedule:
    # Check daily at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check latest scrhub version
        id: check
        run: |
          LATEST=$(curl -sL https://api.github.com/repos/Fubuki233/scrhub/releases/latest | grep '"tag_name"' | sed 's/.*"tag_name": "\(.*\)".*/\1/')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

          CURRENT=""
          if [ -f .scrhub-version ]; then
            CURRENT=$(cat .scrhub-version)
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "New scrhub version: $LATEST (was: $CURRENT)"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "Up to date: $CURRENT"
          fi

      - name: Trigger rebuild
        if: steps.check.outputs.updated == 'true'
        run: |
          LATEST="${{ steps.check.outputs.latest }}"
          echo "$LATEST" > .scrhub-version

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .scrhub-version
          git commit -m "chore: bump scrhub to ${LATEST}"
          git push origin HEAD
